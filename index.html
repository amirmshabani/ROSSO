<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSSO Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tahoma', 'Vazirmatn', system-ui, sans-serif;
        }
    </style>
</head>

<body class="bg-red-700 text-white min-h-screen">

    <!-- Hero Section -->
    <div class="relative h-[100dvh] min-h-[500px]">
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover">
            <source src="https://cdn.imgurl.ir/uploads/f309042_20260702_170544.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/40"></div>

        <div class="absolute top-0 left-0 right-0 p-3 sm:p-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center shadow-lg">
                    <span class="text-red-700 text-2xl sm:text-4xl font-bold">R</span>
                </div>
                <span class="text-xl sm:text-3xl font-bold tracking-wider">ROSSO</span>
            </div>
        </div>

        <div class="absolute bottom-8 sm:bottom-12 left-0 right-0 text-center px-4 sm:px-6">
            <h1 class="text-4xl sm:text-5xl font-bold mb-2">ROSSO</h1>
            <p class="text-base sm:text-xl opacity-90">Italian Taste • Persian Soul</p>
        </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="bg-red-700 pb-8 sm:pb-12 px-4 sm:px-6">
        <div class="max-w-md mx-auto">
            <div class="grid grid-cols-2 gap-3 sm:gap-5">
                <a href="#"
                    class="bg-white/10 backdrop-blur-md border border-white/30 rounded-2xl sm:rounded-3xl p-4 sm:p-6 text-center hover:scale-105 transition-all">
                    <img src="https://i.postimg.cc/D02Kkrdd/file-00000000cbcc7246a79de57e813d0f20.png" alt="">
                </a>

                <a href="#"
                    class="bg-white/10 backdrop-blur-md border border-white/30 rounded-2xl sm:rounded-3xl p-4 sm:p-6 text-center hover:scale-105 transition-all">
                    <img src="https://i.postimg.cc/sfKkGZJy/file-0000000070e87246b340a02652bac7f1.png" alt="">
                </a>

                <a href="#"
                    class="bg-white/10 backdrop-blur-md border border-white/30 rounded-2xl sm:rounded-3xl p-4 sm:p-6 text-center hover:scale-105 transition-all">
                    <div
                        class="w-14 h-14 sm:w-20 sm:h-20 mx-auto mb-3 sm:mb-4 bg-white rounded-xl sm:rounded-2xl flex items-center justify-center">
                        <i class="fas fa-handshake text-red-700 text-3xl sm:text-5xl"></i>
                    </div>
                    <h3 class="text-lg sm:text-2xl font-bold">همکاری</h3>
                </a>

                <a href="#"
                    class="bg-white/10 backdrop-blur-md border border-white/30 rounded-2xl sm:rounded-3xl p-4 sm:p-6 text-center hover:scale-105 transition-all">
                    <div
                        class="w-14 h-14 sm:w-20 sm:h-20 mx-auto mb-3 sm:mb-4 bg-white rounded-xl sm:rounded-2xl flex items-center justify-center">
                        <i class="fas fa-comments text-red-700 text-3xl sm:text-5xl"></i>
                    </div>
                    <h3 class="text-lg sm:text-2xl font-bold">نظرات</h3>
                </a>
            </div>

            <div class="mt-6 sm:mt-8 flex justify-center">
                <a href="#"
                    class="bg-white/10 backdrop-blur-md border border-white/30 rounded-2xl sm:rounded-3xl px-8 sm:px-12 py-4 sm:py-6 text-center hover:scale-105 transition-all">
                    <div
                        class="w-14 h-14 sm:w-20 sm:h-20 mx-auto mb-3 sm:mb-4 bg-white rounded-xl sm:rounded-2xl flex items-center justify-center">
                        <i class="fab fa-instagram text-red-700 text-3xl sm:text-5xl"></i>
                    </div>
                    <h3 class="text-lg sm:text-2xl font-bold">INSTAGRAM</h3>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
